<div id="bulkActions" style="display:none; padding: 10px; background: #333; display: flex; gap: 10px; color: white;">
    <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> <label>اختيار الكل</label>
    <button onclick="deleteSelected()">حذف المحدد</button>
    <button onclick="pinSelected()">تثبيت</button>
</div>

<script>
    // عند بناء الرسالة، أضف هذا العنصر
    function renderMessage(data) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper received`;
        
        // Checkbox لكل رسالة
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'msg-checkbox';
        checkbox.onchange = checkSelection;

        // ... كمل باقي بناء الرسالة كما في الكود السابق ...
    }

    // دالة اختيار الكل
    function toggleSelectAll() {
        const isChecked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.msg-checkbox').forEach(cb => cb.checked = isChecked);
        checkSelection();
    }

    // دالة حذف المختار من Supabase
    async function deleteSelected() {
        const selected = document.querySelectorAll('.msg-checkbox:checked');
        for (let item of selected) {
            const id = item.dataset.id; // لازم نكون مخزنين الـ ID في الـ HTML
            await supabaseClient.from('messages').delete().eq('id', id);
        }
    }
</script>
